name: Deploy to Dev Environment

# This script only runs when code is pushed to the 'dev' branch
on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # Matches your Lambda runtime

      - name: Install Dependencies
        run: npm install

      - name: Zip the Code
        # Zips everything except the .git folder and github actions folder
        run: zip -r function.zip . -x "*.git*" -x ".github/*"

      - name: Deploy to AWS Lambda (Dev)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
        run: aws lambda update-function-code --function-name my-api-dev --zip-file fileb://function.zip